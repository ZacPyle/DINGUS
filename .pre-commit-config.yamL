# .pre-commit-config.yaml
repos:
  - repo: https://github.com/psf/black
    rev: 25.9.0
    hooks: [{ id: black }]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks: [{ id: ruff }]
  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks: [{ id: isort }]
