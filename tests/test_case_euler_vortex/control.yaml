# Speicify the case name. This is primarily used for output and origanization.
name: "test_case_euler_vortex"

# Specify the physics-specific parameters.
physics:
  model          : "euler"             # PDE(s) you wish to approximate. 
  gamma          : 1.4                 # Ratio of specific heats
  #Re             : 1000                # Reynolds number (if applicable)
  #Pr             : 0.71                # Prandtl number (if applicable)
  #mach_ref       : 1.0                 # Reference Mach number (if applicable)
  riemann_solver : "roe"              # Riemann solver used to compute element boundary fluxes

# Specify the mesh-specific parameters.
mesh:
  mesh_format: "HOHQMesh"           # Format the mesh file is written in
  mesh_file  : "./inputs/SquareBIG.mesh"  # Mesh file name (including the path if not in the same directory as this input file)
  ndim       : 2                    # Spatial dimensionality of the problem (1, 2, or 3)
  poly_deg   : 6                    # Polynomial degree for solution approximation within each element
  quad_type  : "LG"                 # Quadrature type: Legendre-Gauss (LG) or Legendre-Gauss-Lobatto (LGL)

# Specify the time-stepping-specific parameters.
time_stepping:
  time_integrator : "rk4"            # Time integration scheme.
  cfl             :  0.8             # CFL number for stable, explicit time-stepping.
  start_time      :  0.0             # start time of the simulation
  final_time      :  0.1             # final time to which the simulation will be run.

# Specify the initial condition parameters.
initialization:
  IC_method : "analytical"              # Method for computing the initial condition. Valid options are: 'analytical', 'datafile', or 'restart'. If not specified, this defaults to 'analytical'.
  IC_file   : "./inputs/initial_condition_vortex.py"    # File name for the the initial condition file. If not specified, this defaults to 'initial_condition.py'. 

# Specify parameters for IO operations
io:
  output_dir        : './outputs/'
  plot_uniform_grid : False
  uniform_grid_res  : 250
  output_format     : 'vtk'
  output_interval   : 0.05
  monitor_run       : False

# Specify the boundary condition dictionary
boundary_conditions:
  Bottom : {type: periodic, partner: Top   }
  Right  : {type: periodic, partner: Left  }
  Top    : {type: periodic, partner: Bottom}
  Left   : {type: periodic, partner: Right } 