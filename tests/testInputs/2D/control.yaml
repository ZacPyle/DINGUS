# Speicify the case name. This is primarily used for output and origanization.
name: "test_case_scalar_advection"

# Specify the physics-specific parameters.
physics:
  model    : "scalar_advection"  # PDE(s) you wish to approximate. 
  gamma    : 1.4                 # Ratio of specific heats
  Re       : 1000                # Reynolds number (if applicable)
  #Pr       : 0.71                # Prandtl number (if applicable)
  mach_ref : 1.0                 # Reference Mach number (if applicable)

# Specify the mesh-specific parameters.
mesh:
  mesh_format: "HOHQMesh"           # Format the mesh file is written in
  mesh_file  : "Square_ISMV2.mesh"  # Mesh file name (including the path if not in the same directory as this input file)
  ndim       : 2                    # Spatial dimensionality of the problem (1, 2, or 3)
  poly_deg   : 8                    # Polynomial degree for solution approximation within each element
  quad_type  : "LG"                 # Quadrature type: Legendre-Gauss (LG) or Legendre-Gauss-Lobatto (LGL)

# Specify the time-stepping-specific parameters.
time_stepping:
  time_integrator : "euler"         # Time integration scheme.
  cfl             : 0.2             # CFL number for stable, explicit time-stepping.
  final_time      : 1.0             # final time to which the simulation will be run.

# Specify the initial condition parameters.
initialization:
  IC_method : "analytical"              # Method for computing the initial condition. Valid options are: 'analytical', 'datafile', or 'restart'. If not specified, this defaults to 'analytical'.
  IC_file   : "initial_condition.py"    # File name for the the initial condition file. If not specified, this defaults to 'initial_condition.py'. 

# Specify parameters for IO operations
io:
  output_dir        : './Output/'
  plot_uniform_grid : False
  output_format     : 'hdf5'
  output_interval   : 0.1
  monitor_run       : False